<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Activating TabVault Pro…</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e; min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .card {
      background: #fff; border-radius: 16px;
      padding: 40px 32px; max-width: 400px; width: 100%;
      text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }
    .logo { font-size: 20px; font-weight: 800; color: #1a1a2e; margin-bottom: 28px; }
    .logo span { color: #2196f3; }
    .icon { font-size: 56px; margin-bottom: 16px; }
    h1 { font-size: 20px; font-weight: 800; color: #1a1a2e; margin-bottom: 8px; }
    p  { font-size: 13px; color: #64748b; line-height: 1.6; margin-bottom: 24px; }
    .btn {
      display: block; width: 100%; background: #2196f3; color: #fff;
      border: none; border-radius: 10px; padding: 14px;
      font-size: 15px; font-weight: 800; cursor: pointer;
      text-decoration: none; transition: background .15s; margin-bottom: 10px;
    }
    .btn:hover { background: #1976d2; }
    .btn.secondary {
      background: #f0f4f8; color: #64748b;
      font-size: 13px; font-weight: 600; padding: 11px;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">Tab<span>Vault</span></div>
  <div class="icon">🎉</div>
  <h1>Thanks for going Pro!</h1>
  <p>Click below to activate TabVault Pro in your browser instantly.</p>
  <a class="btn" id="activate-btn" href="#">Activate TabVault Pro →</a>
  <a class="btn secondary" href="https://aplabs.lemonsqueezy.com/customer-portal" target="_blank">View my order</a>
</div>

<script>
  const key = new URLSearchParams(window.location.search).get('key');
  const EXT = 'libdmhkmllkihogjfoekeahknlbpnlfd';
  if (key) {
    document.getElementById('activate-btn').href =
      `chrome-extension://${EXT}/activate.html?key=${encodeURIComponent(key)}`;
  } else {
    document.getElementById('activate-btn').textContent = 'Key not found — check your email';
    document.getElementById('activate-btn').style.background = '#94a3b8';
  }
</script>
</body>
</html>
